<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor d'Horaris: Ona & Lia + ✨ IA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .grid-cols-6 { grid-template-columns: 80px repeat(5, 1fr); }
        .hour-row { height: 60px; border-top: 1px solid #e5e7eb; }
        
        .event-block {
            position: absolute;
            width: calc(100% - 8px);
            left: 4px;
            border-radius: 6px;
            padding: 4px;
            font-size: 0.75rem;
            line-height: 1.1;
            overflow: hidden;
            transition: all 0.3s ease;
            border: 1px solid rgba(0,0,0,0.05);
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        .ona-ev { 
            background-color: rgba(219, 234, 254, 0.85); /* Blue-100 amb transparència */
            color: #1e40af; 
            z-index: 10;
        }
        .lia-ev { 
            background-color: rgba(252, 231, 243, 0.85); /* Pink-100 amb transparència */
            color: #9d174d; 
            z-index: 11;
        }

        .conflict-bg { 
            background: repeating-linear-gradient(
                45deg,
                #f3e8ff,
                #f3e8ff 10px,
                #e9d5ff 10px,
                #e9d5ff 20px
            );
            color: #6b21a8;
            border: 2px solid #a855f7;
            z-index: 30;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .ai-panel {
            background: linear-gradient(135deg, #f5f3ff 0%, #ffffff 100%);
            border: 1px solid #ddd6fe;
        }

        @media (max-width: 640px) {
            .grid-cols-6 { grid-template-columns: 50px repeat(5, 1fr); }
            .event-text { display: none; }
        }
    </style>
</head>
<body class="bg-gray-50 font-sans text-gray-900">

    <div class="max-w-6xl mx-auto p-4 sm:p-6">
        <header class="mb-8 flex flex-col md:flex-row md:items-center md:justify-between gap-4">
            <div>
                <h1 class="text-3xl font-bold text-gray-800">Calendari Ona & Lia</h1>
                <p class="text-gray-500 italic">Disseny original amb intel·ligència logística</p>
            </div>
            
            <div class="flex flex-wrap gap-2 bg-white p-2 rounded-xl shadow-sm border border-gray-100">
                <button id="toggleOna" onclick="filter('ona')" class="px-4 py-2 rounded-lg text-sm font-medium transition-colors bg-blue-100 text-blue-700 border border-blue-200">Ona</button>
                <button id="toggleLia" onclick="filter('lia')" class="px-4 py-2 rounded-lg text-sm font-medium transition-colors bg-pink-100 text-pink-700 border border-pink-200">Lia</button>
                <button id="toggleConflict" onclick="filter('conflict')" class="px-4 py-2 rounded-lg text-sm font-medium transition-colors bg-purple-100 text-purple-700 border border-purple-200">Solapaments</button>
                <button onclick="resetFilters()" class="px-4 py-2 rounded-lg text-sm font-medium hover:bg-gray-200 transition-colors bg-gray-50 border border-gray-200 text-gray-600">Veure Tot</button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            <!-- Calendari -->
            <div class="lg:col-span-3 bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-200">
                <div class="grid grid-cols-6 bg-gray-100 border-b border-gray-200 font-bold text-sm uppercase tracking-wider">
                    <div class="p-4 text-gray-400">Hora</div>
                    <div class="p-4 text-center">Dll</div>
                    <div class="p-4 text-center">Dt</div>
                    <div class="p-4 text-center">Dc</div>
                    <div class="p-4 text-center">Dj</div>
                    <div class="p-4 text-center">Dv</div>
                </div>

                <div class="relative grid grid-cols-6" id="timetable">
                    <div class="bg-gray-50 border-r border-gray-200" id="hourLabels"></div>
                    <div class="relative border-r border-gray-100 day-col" data-day="1"></div>
                    <div class="relative border-r border-gray-100 day-col" data-day="2"></div>
                    <div class="relative border-r border-gray-100 day-col" data-day="3"></div>
                    <div class="relative border-r border-gray-100 day-col" data-day="4"></div>
                    <div class="relative day-col" data-day="5"></div>
                </div>
            </div>

            <!-- IA Panel -->
            <div class="lg:col-span-1 flex flex-col gap-4">
                <div class="ai-panel p-5 rounded-2xl shadow-sm border">
                    <h2 class="text-lg font-bold text-purple-800 mb-3 flex items-center gap-2">
                        <span>✨</span> Assistent IA
                    </h2>
                    
                    <div class="space-y-3">
                        <button onclick="generateAITips()" class="w-full py-3 px-4 bg-purple-600 hover:bg-purple-700 text-white rounded-xl font-medium transition-all shadow-lg flex items-center justify-center gap-2">
                            <span>✨</span> Tips Logística
                        </button>
                        <button onclick="generateMenu()" class="w-full py-3 px-4 bg-white border-2 border-purple-200 text-purple-700 hover:border-purple-400 rounded-xl font-medium transition-all flex items-center justify-center gap-2">
                            <span>🍲</span> Menú Tarda
                        </button>
                    </div>

                    <div id="aiResponse" class="mt-6 text-sm text-gray-700 hidden">
                        <div class="p-4 bg-white rounded-lg border border-purple-100 shadow-inner max-h-80 overflow-y-auto" id="aiContent"></div>
                    </div>

                    <div id="aiLoader" class="mt-6 text-center hidden">
                        <div class="inline-block animate-spin rounded-full h-8 w-8 border-4 border-purple-500 border-t-transparent"></div>
                    </div>
                </div>
                
                <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100 text-xs space-y-2">
                    <div class="flex items-center gap-2"><span class="w-3 h-3 bg-blue-200 rounded"></span> Ona</div>
                    <div class="flex items-center gap-2"><span class="w-3 h-3 bg-pink-200 rounded"></span> Lia</div>
                    <div class="flex items-center gap-2"><span class="w-3 h-3 conflict-bg rounded"></span> Solapament Tarda</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const apiKey = ""; 
        const CONFIG = { startHour: 8, endHour: 21, rowHeight: 60, conflictThresholdMins: 16 * 60 + 30 };

        const onaSchedule = [
            { day: 1, start: "08:00", end: "14:30", name: "Classe" },
            { day: 1, start: "18:00", end: "19:30", name: "Europa Àliga" },
            { day: 2, start: "08:13", end: "13:30", name: "Classe" },
            { day: 2, start: "15:00", end: "17:00", name: "Classe" },
            { day: 3, start: "08:00", end: "13:30", name: "Classe" },
            { day: 3, start: "15:40", end: "17:10", name: "Kids&Us" },
            { day: 3, start: "18:00", end: "19:30", name: "Europa Thau" },
            { day: 4, start: "08:00", end: "13:30", name: "Classe" },
            { day: 4, start: "15:00", end: "17:00", name: "Classe" },
            { day: 4, start: "19:00", end: "20:30", name: "Europa Àliga" },
            { day: 5, start: "08:00", end: "13:30", name: "Classe" },
            { day: 5, start: "15:40", end: "17:10", name: "Kids&Us" }
        ];

        const liaSchedule = [
            ...[1,2,3,4,5].map(d => ({ day: d, start: "09:00", end: "16:30", name: "Classe" })),
            { day: 1, start: "16:30", end: "18:00", name: "Patinatge" },
            { day: 3, start: "16:50", end: "18:20", name: "Kids&Us" },
            { day: 4, start: "18:15", end: "19:00", name: "Rítmica" }
        ];

        function timeToMinutes(timeStr) {
            const [h, m] = timeStr.split(':').map(Number);
            return h * 60 + m;
        }

        function renderTimetable() {
            const hourCol = document.getElementById('hourLabels');
            for (let h = CONFIG.startHour; h <= CONFIG.endHour; h++) {
                const label = document.createElement('div');
                label.className = 'hour-row flex items-start justify-center pt-2 text-xs text-gray-400';
                label.innerText = `${h.toString().padStart(2, '0')}:00`;
                hourCol.appendChild(label);
                for (let d = 1; d <= 5; d++) {
                    const line = document.createElement('div');
                    line.className = 'absolute w-full border-t border-gray-100 pointer-events-none';
                    line.style.top = `${(h - CONFIG.startHour) * CONFIG.rowHeight}px`;
                    document.querySelector(`[data-day="${d}"]`).appendChild(line);
                }
            }
            drawEvents(onaSchedule, 'ona');
            drawEvents(liaSchedule, 'lia');
            detectConflictsAfternoon();
        }

        function drawEvents(schedule, owner) {
            schedule.forEach(ev => {
                const col = document.querySelector(`[data-day="${ev.day}"]`);
                const start = timeToMinutes(ev.start);
                const end = timeToMinutes(ev.end);
                const top = (start - (CONFIG.startHour * 60)) * (CONFIG.rowHeight / 60);
                const height = (end - start) * (CONFIG.rowHeight / 60);
                const div = document.createElement('div');
                div.className = `event-block ${owner}-ev`;
                div.style.top = `${top}px`;
                div.style.height = `${height}px`;
                div.dataset.start = start;
                div.dataset.end = end;
                div.innerHTML = `<div class="font-bold truncate">${ev.name}</div><div class="text-[9px] opacity-90">${ev.start}-${ev.end}</div>`;
                col.appendChild(div);
            });
        }

        function detectConflictsAfternoon() {
            for (let d = 1; d <= 5; d++) {
                const col = document.querySelector(`[data-day="${d}"]`);
                const onaE = col.querySelectorAll('.ona-ev');
                const liaE = col.querySelectorAll('.lia-ev');
                onaE.forEach(o => {
                    liaE.forEach(l => {
                        const os = parseInt(o.dataset.start), oe = parseInt(o.dataset.end);
                        const ls = parseInt(l.dataset.start), le = parseInt(l.dataset.end);
                        if (os < le && ls < oe) {
                            const is = Math.max(os, ls), ie = Math.min(oe, le);
                            if (ie > CONFIG.conflictThresholdMins) {
                                const cs = Math.max(is, CONFIG.conflictThresholdMins), ce = ie;
                                if (ce > cs) {
                                    const top = (cs - (CONFIG.startHour * 60)) * (CONFIG.rowHeight / 60);
                                    const height = (ce - cs) * (CONFIG.rowHeight / 60);
                                    const cDiv = document.createElement('div');
                                    cDiv.className = `event-block conflict-bg conflict-ev`;
                                    cDiv.style.top = `${top}px`;
                                    cDiv.style.height = `${height}px`;
                                    cDiv.innerHTML = `<div class="font-bold text-[9px]">SOLAPAMENT</div>`;
                                    col.appendChild(cDiv);
                                }
                            }
                        }
                    });
                });
            }
        }

        async function callGemini(prompt) {
            const loader = document.getElementById('aiLoader'), resp = document.getElementById('aiResponse'), cont = document.getElementById('aiContent');
            loader.classList.remove('hidden'); resp.classList.add('hidden');
            const payload = { contents: [{ parts: [{ text: prompt }] }], systemInstruction: { parts: [{ text: "Ets un assistent expert en organització familiar catalana. Respon en català." }] } };
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload)
                });
                const result = await response.json();
                const text = result.candidates?.[0]?.content?.parts?.[0]?.text;
                loader.classList.add('hidden'); resp.classList.remove('hidden');
                cont.innerHTML = text.replace(/\n/g, '<br>').replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            } catch (e) { loader.classList.add('hidden'); alert("Error amb la IA."); }
        }

        function generateAITips() { callGemini(`Dona 3 consells logístics per aquests horaris d'Ona i Lia centrats en les tardes: Ona: ${JSON.stringify(onaSchedule)}, Lia: ${JSON.stringify(liaSchedule)}`); }
        function generateMenu() { callGemini(`Suggereix un menú de sopars ràpids per a nenes amb aquests horaris: Ona fins les 20:30 alguns dies, Lia fins les 18:20.`); }

        function filter(type) {
            document.querySelectorAll('.event-block').forEach(el => el.classList.add('hidden'));
            if (type === 'ona') document.querySelectorAll('.ona-ev').forEach(el => el.classList.remove('hidden'));
            else if (type === 'lia') document.querySelectorAll('.lia-ev').forEach(el => el.classList.remove('hidden'));
            else if (type === 'conflict') document.querySelectorAll('.conflict-ev').forEach(el => el.classList.remove('hidden'));
        }
        function resetFilters() { document.querySelectorAll('.event-block').forEach(el => el.classList.remove('hidden')); }

        window.onload = renderTimetable;
    </script>
</body>
</html>
